<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Worksheet Title</title>

  <!--
    FONT PAIRS — swap the link tag and --body-font/--heading-font for audience:

    K-5:       family=Fredoka:wght@400;500;600&family=Lexend:wght@400;500
    6-12:      family=DM+Serif+Display&family=Atkinson+Hyperlegible:wght@400;700
    Adult/pro: family=Instrument+Serif&family=Atkinson+Hyperlegible:wght@400;700
  -->
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=Instrument+Serif&display=swap" rel="stylesheet">

  <style>
    /* ═══════════════════════════════════════════════
       Worksheet — audience-tunable variables
       Change the :root vars for a different audience.
       ═══════════════════════════════════════════════ */
    :root {
      /* Ink — all values ≥ 4.5:1 contrast on white (WCAG AA body text).
         --ink-muted was #888 (3.5:1, FAIL) before 2026-04-12. */
      --ink: #1a1a1a;
      --ink-light: #555;
      --ink-muted: #595959;

      /* Rules / dividers */
      --rule: #d0d0d0;
      --rule-light: #e8e8e8;

      /* Accent — pick ONE from the Okabe-Ito CVD-safe palette */
      --accent: #009E73;            /* default: general green */
      --accent-light: #e8f5ee;
      /* math / science:  #0072B2  (light #e6f2f9) */
      /* ela / lang arts: #E69F00  (light #fdf3e0) */

      /* Callout backgrounds */
      --bg-callout: #f5f5f0;

      /* Typography */
      --body-font: 'Atkinson Hyperlegible', system-ui, -apple-system, sans-serif;
      --heading-font: 'Instrument Serif', Georgia, serif;
      --body-size: 11pt;
      --h1-size: 26pt;

      /* Spacing */
      --write-line-height: 26px;
      --part-gap: 14px;
    }

    /* ── PAGE FRAME ──
       Pure @page rule, no paper-css dependency.
       `.sheet` carries explicit width/height for the Safari case where
       `@page size` alone fails silently (MDN #28626), and `overflow: hidden`
       is what keeps page 1 content from bleeding into page 2 in browser
       preview. The printed PDF enforces its own page boundary, but the
       on-screen preview won't unless we clip here.

       Print strategy: 0.5in `@page` margin is a hard safe zone — any
       browser print-dialog margin preset ("Default", "None", "Minimum",
       custom) will still leave content inside the printable area. The
       0.5in choice matches Letter and A4 equally well and absorbs the
       header/footer strip some browsers add in default mode.
    */
    @page {
      size: 8.5in 11in;                    /* explicit dims, not `letter` keyword */
      margin: 0.5in;                       /* hard safe zone for all print presets */
    }

    html, body {
      margin: 0;
      padding: 0;
    }

    body {
      background: #e0e0e0;                 /* browser preview only */
      font-family: var(--body-font);
      font-size: var(--body-size);
      color: var(--ink);
      line-height: 1.5;
      text-align: left;                    /* never justify — print spacing */
      -webkit-font-smoothing: antialiased;
    }

    .sheet {
      width: 7.5in;                        /* 8.5in − 2×0.5in safe margin */
      height: 10in;                        /* 11in − 2×0.5in safe margin */
      background: white;
      margin: 16px auto;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      overflow: hidden;                    /* clip preview overflow to match PDF */
      page-break-after: always;
      break-after: page;
    }
    .sheet:last-child {
      page-break-after: auto;
      break-after: auto;
    }

    .page-inner {
      padding: 18px 24px 14px;             /* small visual breathing room on top of the @page margin */
      height: 100%;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
    }

    /* Atomic blocks — never break across pages. Prevents widow code
       lines, half callouts, and single-row table fragments. */
    pre,
    .code-block,
    .callout,
    .predict-table,
    .draw-box,
    .match-grid,
    table {
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    /* ── HEADER ── */
    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding-bottom: 10px;
      border-bottom: 2.5px solid var(--ink);
      margin-bottom: 16px;
      flex-shrink: 0;
    }
    .page-header h1 {
      font-family: var(--heading-font);
      font-size: var(--h1-size);
      font-weight: 400;
      letter-spacing: -0.5px;
      margin: 0;
      line-height: 1.1;
    }
    .subtitle {
      font-size: 10pt;
      font-weight: 500;
      color: var(--ink-light);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-top: 3px;
    }
    .page-number {
      font-size: 10pt;
      color: var(--ink-muted);
      white-space: nowrap;
      margin-top: 4px;
    }
    .page-number span { font-weight: 600; color: var(--ink); }

    /* ── FOOTER ── */
    .page-footer {
      flex-shrink: 0;
      border-top: 1px solid var(--rule);
      padding-top: 6px;
      display: flex;
      justify-content: space-between;
      font-size: 9pt;
      color: var(--ink-muted);
      margin-top: auto;
    }

    /* ── SECTION PARTS ── */
    .part { margin-bottom: var(--part-gap); }
    .part:last-child { margin-bottom: 0; }

    .part-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .part-number {
      font-size: 10pt;
      font-weight: 600;
      color: white;
      background: #000;
      border-radius: 3px;
      padding: 2px 7px;
      letter-spacing: 0.5px;
      flex-shrink: 0;
      /* Firefox Economy Mode drops sub-black fills on elements that
         depend on them for legibility. Pin this one to print-exact. */
      print-color-adjust: exact;
      -webkit-print-color-adjust: exact;
    }
    .part-title {
      font-family: var(--heading-font);
      font-size: 17pt;
      font-weight: 400;
      line-height: 1.2;
    }
    .part-instruction {
      font-size: 10.5pt;
      color: var(--ink-light);
      font-style: italic;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    /* ── NAME / DATE FIELDS ── */
    .fields-row { display: flex; gap: 16px; margin-bottom: 12px; flex-shrink: 0; }
    .field { flex: 1; display: flex; align-items: baseline; gap: 6px; }
    .field-label {
      font-size: 10pt;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--ink-light);
      white-space: nowrap;
    }
    .field-line { flex: 1; border-bottom: 1px solid var(--rule); min-height: 18px; }

    /* ── COMPONENTS ──
       Inline the blocks you need from references/components.css
       directly below this comment. Drop the ones you don't use.
    */

    /* ── PRINT ──
       Keep the explicit width/height from .sheet — do NOT switch to
       width: 100% / height: 100%. Safari silently collapses percentage
       dims inside a paginated context, and the @page margin already
       places .sheet inside the printable area for us.
    */
    @media print {
      body {
        background: white;
        print-color-adjust: exact;
        -webkit-print-color-adjust: exact;
      }
      .sheet {
        margin: 0;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>

  <section class="sheet">
    <div class="page-inner">

      <header class="page-header">
        <div>
          <h1>Worksheet Title</h1>
          <div class="subtitle">Subtitle or class name</div>
        </div>
        <div class="page-number">Page <span>1</span> of 1</div>
      </header>

      <div class="fields-row">
        <div class="field">
          <span class="field-label">Name</span>
          <span class="field-line"></span>
        </div>
        <div class="field">
          <span class="field-label">Date</span>
          <span class="field-line"></span>
        </div>
      </div>

      <div class="content">

        <div class="part">
          <div class="part-header">
            <span class="part-number">01</span>
            <span class="part-title">Section title here</span>
          </div>
          <div class="part-instruction">Brief instruction in italics.</div>
          <!-- drop a component here -->
        </div>

      </div>

      <footer class="page-footer">
        <span>Course or school name</span>
        <span>worksheet-maker</span>
      </footer>

    </div>
  </section>

</body>
</html>
